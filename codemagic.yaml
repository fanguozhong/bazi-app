workflows:
  ios-build:
    name: iOS Build
    max_build_duration: 60
    environment:
      ios-signing:
        distribution_type: ad_hoc
        bundle_identifier: com.quxiang.bazi
      vars:
        XCODE_WORKSPACE: "App/App.xcworkspace"
        XCODE_SCHEME: "App"
        TARGET: "App"
    scripts:
      - name: Install CocoaPods dependencies
        script: |
          cd $CM_BUILD_DIR/App
          pod install
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files $BUNDLE_ID --type IOS_APP_STORE_CONNECT
          # For development/ad-hoc:
          # app-store-connect fetch-signing-files $BUNDLE_ID --type AD_HOC --create-master-app
      - name: Build iOS App
        script: |
          cd $CM_BUILD_DIR/App
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --configuration Release \
            --distribution-type ad_hoc
    artifacts:
      - build/*.ipa
      - build/*.dSYM.zip
